<div class="flex flex-col items-center justify-center h-full gap-4 p-6 bg-[#0A0A0A]">
  <!-- Stats Cards -->
  <div class="grid grid-cols-4 gap-4 w-full max-w-6xl mb-4">
    <div class="bg-[#171717] p-4 rounded-lg text-white text-center">
      <p class="text-xs">Number of units</p>
      <p class="text-2xl font-bold">200,000</p>
    </div>
    <div class="bg-[#171717] p-4 rounded-lg text-white text-center">
      <p class="text-xs">Weather</p>
      <p class="text-2xl font-bold">Sunny</p>
    </div>
    <div class="bg-[#171717] p-4 rounded-lg text-white text-center">
      <p class="text-xs">Number of assets</p>
      <p class="text-2xl font-bold">100,000</p>
    </div>
    <div class="bg-[#171717] p-4 rounded-lg text-white text-center">
      <p class="text-xs">Base Locations</p>
      <p class="text-2xl font-bold">10</p>
    </div>
  </div>

  <!-- 2D / 3D Toggle -->
  <div class="flex gap-2 mb-4">
    <button
      class="px-4 py-2 rounded-lg bg-[#171717] text-white"
      [class.bg-green-400]="!is3D"
      (click)="toggleView(false)"
    >
      2D Map
    </button>
    <button
      class="px-4 py-2 rounded-lg bg-[#171717] text-white"
      [class.bg-green-400]="is3D"
      (click)="toggleView(true)"
    >
      3D Globe
    </button>
  </div>

  <!-- Globe / Map Container -->
  <div #globeContainer class="w-full max-w-4xl h-[500px] relative z-0"></div>
</div>
